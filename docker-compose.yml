version: '3.8'

services:
  # 1. POSTGRESQL - For forensic logs and historical data
  postgres:
    image: postgres:16-alpine
    container_name: sentinel_postgres
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel123
      POSTGRES_DB: sentinel_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # 2. NEO4J - The Temporal Knowledge Graph
  neo4j:
    image: neo4j:5.20-community
    container_name: sentinel_neo4j
    environment:
      NEO4J_AUTH: neo4j/password123
    ports:
      - "7475:7474"   # Browser UI
      - "7688:7687"   # Bolt Protocol (DB connection)
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  # 3. REDIS - The real-time streaming bus (Heartbeat)
  redis:
    image: redis:7.2-alpine
    container_name: sentinel_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # 4. BACKEND - FastAPI (We will build this next phase)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentinel_backend
    ports:
      - "8001:8000"
    depends_on:
      - postgres
      - neo4j
      - redis
    environment:
      - REDIS_URL=redis://redis:6379
      - NEO4J_URI=bolt://neo4j:7687
      - DATABASE_URL=postgresql://sentinel:sentinel123@postgres:5432/sentinel_db
      - GROQ_API_KEY=${GROQ_API_KEY}
      - ANONYMIZED_TELEMETRY=False
    volumes:
      - ./backend:/app
    restart: unless-stopped

  # 5. FRONTEND - Next.js (We will build this later)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sentinel_frontend
    ports:
      - "3001:3000"
    depends_on:
      - backend
    restart: unless-stopped

  # 6. SIMULATOR - Generates live IoT data stream automatically
  simulator:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentinel_simulator
    command: python simulation/simulator.py
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./backend:/app
    restart: unless-stopped

volumes:
  postgres_data:
  neo4j_data:
  redis_data: